<!DOCTYPE html>
<html lang="da" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systemate utility CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css?v=28">
</head>
<body class="h-full">
    <div id="app" class="min-h-full">
        <!-- Sidebar Navigation -->
        <nav id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-gray-900 text-white flex flex-col z-40">
            <div class="p-6 border-b border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">Systemate</h1>
                        <p class="text-xs text-gray-400 mt-1">utility CRM</p>
                    </div>
                    <!-- Notification bell -->
                    <div id="notification-bell" class="relative cursor-pointer p-1 hover:bg-gray-800 rounded-lg" title="Notifikationer">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span id="notification-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
                    </div>
                </div>
            </div>

            <!-- Search -->
            <div class="px-4 py-3 border-b border-gray-800">
                <div class="relative">
                    <input id="global-search" type="text" placeholder="Soeg virksomheder, kontakter..."
                           class="w-full bg-gray-800 text-gray-200 rounded-lg pl-8 pr-3 py-2 text-sm placeholder-gray-500 border border-gray-700 focus:border-blue-500 focus:outline-none">
                    <svg class="w-4 h-4 absolute left-2.5 top-2.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <div id="search-results" class="hidden absolute left-0 right-0 top-full mt-1 bg-white rounded-lg shadow-lg border z-50 max-h-80 overflow-y-auto text-gray-900"></div>
                </div>
            </div>

            <div class="flex-1 py-4">
                <a href="#/" class="nav-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition-colors" data-page="">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </a>
                <a href="#/companies" class="nav-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition-colors" data-page="companies">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    Virksomheder
                </a>
                <a href="#/tenders" class="nav-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition-colors" data-page="tenders">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Tilbud & Udbud
                </a>
                <a href="#/tasks" class="nav-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition-colors" data-page="tasks">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                    Sager
                </a>
                <a href="#/users" class="nav-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition-colors" data-page="users">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    Brugere
                </a>
                <a href="#/settings" class="nav-link flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition-colors" data-page="settings">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Indstillinger
                </a>
            </div>

            <!-- User selector -->
            <div class="p-4 border-t border-gray-700">
                <label class="block text-xs text-gray-500 mb-1">Logget ind som:</label>
                <select id="user-selector" class="w-full bg-gray-800 text-gray-200 rounded-lg px-2 py-1.5 text-sm border border-gray-700 focus:border-blue-500 focus:outline-none">
                    <option value="">Vaelg bruger...</option>
                </select>
                <div class="text-xs text-gray-600 mt-2">Systemate utility CRM v4.0</div>
            </div>
        </nav>

        <!-- Notification Panel -->
        <div id="notification-panel" class="hidden fixed top-0 right-0 w-96 h-full bg-white shadow-2xl z-50 flex flex-col">
            <div class="flex items-center justify-between p-4 border-b">
                <h2 class="font-semibold text-gray-900">Notifikationer</h2>
                <div class="flex gap-2">
                    <button id="mark-all-read" class="text-xs text-blue-600 hover:text-blue-800">Marker alle som laest</button>
                    <button id="close-notifications" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
                </div>
            </div>
            <div id="notification-list" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
        </div>

        <!-- Main Content -->
        <main id="content" class="ml-64 p-8">
            <!-- Pages render here -->
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div id="modal-content" class="bg-white rounded-xl shadow-2xl max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
        </div>
    </div>

    <script type="module" src="/static/js/api.js?v=28"></script>
    <script type="module" src="/static/js/app.js?v=28"></script>
</body>
</html>
